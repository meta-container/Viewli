<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Landscape Viewer</title>
    <style>
        :root {
            --overlay-bg: rgba(0, 0, 0, 0.5);
            --text-color: #ffffff;
            --primary-font: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: var(--primary-font);
            user-select: none; /* Prevent text selection */
        }

        /* Image Viewer */
        #viewer-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #active-image {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Changed to contain to ensure full landscape visibility without cropping */
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
            display: block;
        }

        #active-image.loaded {
            opacity: 1;
        }

        /* UI Overlays */
        #info-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--overlay-bg);
            color: var(--text-color);
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.9rem;
            backdrop-filter: blur(8px);
            z-index: 10;
            display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            pointer-events: none;
        }

        /* Loading Spinner */
        #spinner {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 20;
            transition: opacity 0.3s;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Click Zones for Navigation (Mobile/Mouse friendly) */
        .click-zone {
            position: absolute;
            top: 0;
            height: 100%;
            width: 15%;
            z-index: 15;
            cursor: pointer;
            /* Transparent but hoverable */
        }
        #zone-prev { left: 0; }
        #zone-next { right: 0; }

        /* Subtle hint arrows */
        .hint-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 2rem;
            pointer-events: none;
            transition: color 0.3s;
        }
        #zone-prev:hover .hint-arrow { color: rgba(255,255,255,0.8); }
        #zone-next:hover .hint-arrow { color: rgba(255,255,255,0.8); }

    </style>

    <!-- Load MediaPipe asynchronously to prevent blocking -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="viewer-container">
        <div id="spinner"></div>
        <img id="active-image" alt="Landscape" />
        
        <!-- Info Overlay -->
        <div id="info-overlay">
            <strong id="ui-source">Loading...</strong> | <span id="ui-topic">...</span><br>
            <small style="opacity: 0.8">Image <span id="ui-index">0</span> of <span id="ui-total">0</span></small>
        </div>

        <!-- Invisible Click Zones -->
        <div id="zone-prev" class="click-zone" onclick="prevImage()">
            <div class="hint-arrow">&#10094;</div>
        </div>
        <div id="zone-next" class="click-zone" onclick="nextImage()">
            <div class="hint-arrow">&#10095;</div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. CONFIGURATION
        // ==========================================
        const SEARCH_CONFIG = [
            { site: 'unsplash', prompt: 'forest landscape' },
            { site: 'pexels', prompt: 'city skyline night' },
            { site: 'unsplash', prompt: 'ocean sunset' },
            { site: 'pexels', prompt: 'mountain range snow' }
        ];

        // ==========================================
        // 2. STATE
        // ==========================================
        let playlist = [];
        let currentIndex = 0;
        let imagesLoadedCount = 0;
        let isGestureActive = false; // Toggle if you want to re-enable gestures later

        // Gesture Variables (Kept for potential future use)
        let handPosXHistory = [];
        let lastGestureTime = 0;
        const GESTURE_DEBOUNCE_MS = 1500;
        const GESTURE_THRESHOLD = 0.15;

        // DOM Elements
        const imgElement = document.getElementById('active-image');
        const spinner = document.getElementById('spinner');
        const infoOverlay = document.getElementById('info-overlay');

        // ==========================================
        // 3. IMAGE FETCHING (FIXED URLS)
        // ==========================================
        async function fetchImages() {
            console.log("Starting fetch...");
            
            // We generate the list first
            for (const config of SEARCH_CONFIG) {
                for (let i = 0; i < 3; i++) {
                    const cleanPrompt = encodeURIComponent(config.prompt);
                    // FIXED: Removed spaces in the URL string
                    // Added random lock to ensure unique images per slot
                    const randomLock = Math.floor(Math.random() * 100000);
                    const url = `https://loremflickr.com/1920/1080/${cleanPrompt}?lock=${randomLock}`;
                    
                    playlist.push({
                        url: url,
                        site: config.site,
                        prompt: config.prompt
                    });
                }
            }

            if (playlist.length === 0) {
                spinner.style.display = 'none';
                alert("No images configured.");
                return;
            }

            // Show the first image immediately
            showImage(0);
        }

        // ==========================================
        // 4. DISPLAY LOGIC
        // ==========================================
        function showImage(index) {
            // Loop logic
            if (index < 0) currentIndex = playlist.length - 1;
            else if (index >= playlist.length) currentIndex = 0;
            else currentIndex = index;

            const imgData = playlist[currentIndex];
            
            // Fade out
            imgElement.classList.remove('loaded');
            
            // Preload logic to ensure smooth transition
            const tempImg = new Image();
            
            // Timeout safety: If an image takes > 5 seconds, skip it
            const timeoutId = setTimeout(() => {
                console.warn("Image load timeout, skipping...", imgData.url);
                nextImage(); 
            }, 5000);

            tempImg.onload = () => {
                clearTimeout(timeoutId);
                imgElement.src = imgData.url;
                
                // Wait for the browser to render the new source before fading in
                imgElement.onload = () => {
                    imgElement.classList.add('loaded');
                    spinner.style.display = 'none';
                    updateUI(imgData);
                };
            };

            tempImg.onerror = () => {
                clearTimeout(timeoutId);
                console.error("Failed to load image, skipping...", imgData.url);
                // Try next image automatically
                nextImage();
            };

            tempImg.src = imgData.url;
        }

        function updateUI(data) {
            document.getElementById('ui-source').innerText = data.site.toUpperCase();
            document.getElementById('ui-topic').innerText = data.prompt;
            document.getElementById('ui-index').innerText = currentIndex + 1;
            document.getElementById('ui-total').innerText = playlist.length;
            infoOverlay.style.display = 'block';
        }

        function nextImage() { showImage(currentIndex + 1); }
        function prevImage() { showImage(currentIndex - 1); }

        // ==========================================
        // 5. INPUT HANDLING (Keyboard + Click)
        // ==========================================
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') nextImage();
            else if (e.key === 'ArrowLeft') prevImage();
        });

        // ==========================================
        // 6. OPTIONAL: GESTURE CONTROL (Disabled by default for stability)
        //    Set isGestureActive = true below if you really want it back.
        // ==========================================
        function initGestureControl() {
            if (!isGestureActive) {
                console.log("Gesture control disabled for clean UI.");
                return;
            }

            // Check if library loaded
            if (typeof Hands === 'undefined') {
                console.error("MediaPipe Hands library not loaded yet.");
                return;
            }

            const videoElement = document.createElement('video'); // Hidden video element
            videoElement.style.display = 'none'; 

            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.7
            });

            hands.onResults((results) => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const wrist = results.multiHandLandmarks[0][0];
                    handPosXHistory.push(wrist.x);
                    if (handPosXHistory.length > 10) handPosXHistory.shift();

                    if (handPosXHistory.length === 10) {
                        const deltaX = handPosXHistory[9] - handPosXHistory[0];
                        const now = Date.now();
                        
                        if (now - lastGestureTime > GESTURE_DEBOUNCE_MS) {
                            if (deltaX > GESTURE_THRESHOLD) {
                                nextImage();
                                lastGestureTime = now;
                                handPosXHistory = [];
                            } else if (deltaX < -GESTURE_THRESHOLD) {
                                prevImage();
                                lastGestureTime = now;
                                handPosXHistory = [];
                            }
                        }
                    }
                } else {
                    handPosXHistory = [];
                }
            });

            // Attempt to start camera
            navigator.mediaDevices.getUserMedia({ video: true })
                .then((stream) => {
                    videoElement.srcObject = stream;
                    videoElement.play();
                    const camera = new Camera(videoElement, {
                        onFrame: async () => { await hands.send({ image: videoElement }); },
                        width: 320,
                        height: 240
                    });
                    camera.start();
                    console.log("Camera active for gestures.");
                })
                .catch((err) => {
                    console.warn("Camera access denied or unavailable. Gestures disabled.", err);
                    isGestureActive = false; // Fallback gracefully
                });
        }

        // ==========================================
        // 7. INITIALIZATION
        // ==========================================
        window.addEventListener('DOMContentLoaded', () => {
            fetchImages();
            // Uncomment the line below if you want to try gestures again (requires HTTPS)
            // initGestureControl(); 
        });

    </script>
</body>
</html>
